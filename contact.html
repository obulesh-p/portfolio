<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact | P Obulesu</title>
    <link rel="stylesheet" href="contact.css">
</head>
<body>
    <div class="contact-container">
        <header class="contact-header">
            <h1>Get In <span>Touch</span></h1>
            <p>Have a project in mind or just want to discuss AI automation? Drop a message!</p>
        </header>

        <div class="contact-wrapper">
            <div class="contact-info">
                <div class="info-item">
                    <h3>Email</h3>
                    <p>obulesu.p@email.com</p>
                </div>
                <div class="info-item">
                    <h3>Location</h3>
                    <p>Amrita Vishwa Vidyapeetham | kollam | kerala</p>
                </div>
                <div class="social-links">
                    <a href="#" class="social-icon">LinkedIn</a>
                    <a href="#" class="social-icon">GitHub</a>
                </div>
            </div>

            <form class="contact-form">
                <div class="input-group">
                    <input type="text" placeholder="Your Name" required>
                </div>
                <div class="input-group">
                    <input type="email" placeholder="Your Email" required>
                </div>
                <div class="input-group">
                    <textarea placeholder="Your Message" rows="5" required></textarea>
                </div>
                <button type="submit" class="submit-btn">Send Message</button>
            </form>
        </div>
        
        <a href="portfolio.html" class="back-home">← Back to Portfolio</a>
    </div>
</body>
</html>
